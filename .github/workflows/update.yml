name: Actualizar Dashboard SNS

on:
  schedule:
    # Corre no dia 10 de cada mês às 06:00 UTC
    - cron: "0 6 10 * *"
  workflow_dispatch:
    # Permite correr manualmente a partir do GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Gerar dashboard
        run: python build_dashboard.py --anos 3 --output index.html

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: actualizar dashboard SNS $(date +'%Y-%m')"
          git push
